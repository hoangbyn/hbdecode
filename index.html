<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Braintree Token Decoder</title>
</head>
<body>
  <h2>Braintree Token Decoder</h2>
  <textarea id="token" style="width:100%;height:180px;" placeholder="Paste token here"></textarea><br>
  <button onclick="decodeToken()">Decode</button>
  <pre id="result">Waiting...</pre>

  <script>
    async function decodeToken() {
      const token = document.getElementById("token").value.trim();
      const result = document.getElementById("result");

      if (!token) {
        result.textContent = "Paste token first.";
        return;
      }

      const res = await fetch("/decode?token=" + encodeURIComponent(token));
      result.textContent = await res.text();
    }

    const params = new URLSearchParams(location.search);
    const token = params.get("token");
    if (token) {
      document.getElementById("token").value = token;
      decodeToken();
    }
  </script>
</body>
</html>
