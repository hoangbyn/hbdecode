<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Braintree Token Decoder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f4f4f4;
    }
    h2 {
      margin-bottom: 15px;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      padding: 12px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      padding: 10px 16px;
      margin-top: 10px;
      margin-right: 8px;
      cursor: pointer;
    }
    pre {
      background: #fff;
      border: 1px solid #ddd;
      padding: 15px;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h2>Braintree Token Decoder</h2>

  <textarea id="token" placeholder="Paste token here"></textarea><br>
  <button onclick="decodeToken()">Decode</button>
  <button onclick="copyApiUrl()">Copy API URL</button>

  <pre id="result">Waiting...</pre>

  <script>
    async function decodeToken() {
      const token = document.getElementById("token").value.trim();
      const result = document.getElementById("result");

      if (!token) {
        result.textContent = "Paste token first.";
        return;
      }

      try {
        const res = await fetch("/decode?token=" + encodeURIComponent(token));
        const text = await res.text();
        result.textContent = text;
      } catch (e) {
        result.textContent = "Error: " + e.message;
      }
    }

    function copyApiUrl() {
      const token = document.getElementById("token").value.trim();
      const result = document.getElementById("result");

      if (!token) {
        result.textContent = "Paste token first.";
        return;
      }

      const url = location.origin + "/decode?token=" + encodeURIComponent(token);
      navigator.clipboard.writeText(url)
        .then(() => result.textContent = "Copied:\n" + url)
        .catch(() => result.textContent = "Copy failed. URL:\n" + url);
    }

    const params = new URLSearchParams(location.search);
    const token = params.get("token");
    if (token) {
      document.getElementById("token").value = token;
      decodeToken();
    }
  </script>
</body>
</html>
